apiVersion: v1
kind: Pod
metadata:
  name: my-affinity-pod
  labels:
    app: my-app
spec:
  affinity:
    nodeAffinity:
      # Soft rule — prefers a node with gpu=true
      # but still schedules elsewhere if no match exists
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          preference:
            matchExpressions:
              - key: gpu
                operator: In
                values:
                  - "true"
  containers:
    - name: nginx-container
      image: nginx
      ports:
        - containerPort: 80
