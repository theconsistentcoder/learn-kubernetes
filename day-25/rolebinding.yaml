apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader-binding
  namespace: default
subjects:
  # Who gets the permissions — our ServiceAccount from Day 24
  - kind: ServiceAccount
    name: my-service-account
    namespace: default
roleRef:
  # Which Role to bind
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
