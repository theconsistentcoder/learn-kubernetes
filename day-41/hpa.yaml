apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: my-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-deployment
  # Never go below 2 replicas
  minReplicas: 2
  # Never go above 10 replicas
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale up when CPU exceeds 70%
          # Scale down when CPU drops below 70%
          averageUtilization: 70
