apiVersion: v1
kind: Pod
metadata:
  name: my-sidecar-pod
  labels:
    app: my-app
spec:
  # Shared volume between main container and sidecar
  volumes:
    - name: config-vol
      emptyDir: {}

  containers:
    # Main app — reads config from shared volume
    - name: nginx-container
      image: nginx
      ports:
        - containerPort: 80
      volumeMounts:
        - name: config-vol
          mountPath: /etc/config

    # Sidecar — refreshes config file every 10 seconds
    # Writes current timestamp to app.properties on shared volume
    # Main app gets updated config without restarting
    - name: config-refresher
      image: busybox
      command: ["sh", "-c", "while true; do echo \"last.updated=$(date)\" > /etc/config/app.properties; sleep 10; done"]
      volumeMounts:
        - name: config-vol
          mountPath: /etc/config
