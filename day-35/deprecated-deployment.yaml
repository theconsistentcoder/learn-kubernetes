# This YAML uses extensions/v1beta1 — an API that has been removed
# Applying this to a modern Kubernetes cluster will fail
# Error: no matches for kind "Deployment" in version "extensions/v1beta1"
apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  name: my-deprecated-deployment
spec:
  replicas: 2
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: nginx-container
          image: nginx
          ports:
            - containerPort: 80
