apiVersion: v1
kind: Pod
metadata:
  name: my-resource-pod
  labels:
    app: my-app
spec:
  containers:
    - name: nginx-container
      image: nginx
      ports:
        - containerPort: 80
      resources:
        requests:
          # 250 millicores = quarter of a CPU core
          # Kubernetes uses this to find the right node
          cpu: "250m"
          # 64 megabytes of memory minimum
          memory: "64Mi"
        limits:
          # 500 millicores = half a CPU core maximum
          # Exceeded = CPU gets throttled
          cpu: "500m"
          # 128 megabytes of memory maximum
          # Exceeded = container gets killed
          memory: "128Mi"
