apiVersion: v1
kind: Pod
metadata:
  name: my-storageclass-pod
  labels:
    app: my-app
spec:
  volumes:
    # Reference the PVC by name in the volumes section
    # The Pod does not know or care how the underlying storage was created
    - name: my-storage
      persistentVolumeClaim:
        claimName: my-storageclass-pvc

  containers:
    - name: nginx-container
      image: nginx
      ports:
        - containerPort: 80
      volumeMounts:
        # Mount the dynamically provisioned PVC at /storage
        # This is where the app reads and writes persistent data
        - name: my-storage
          mountPath: /storage
