apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: my-storageclass-pvc
spec:
  # References the StorageClass — Kubernetes will dynamically
  # provision a matching PV automatically, no manual PV needed
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
