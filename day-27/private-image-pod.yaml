apiVersion: v1
kind: Pod
metadata:
  name: my-private-pod
  labels:
    app: my-app
spec:
  # Reference the registry Secret here
  # Kubernetes will use these credentials when pulling the image
  imagePullSecrets:
    - name: my-registry-secret
  containers:
    - name: my-app-container
      # Private image from a private registry
      # Without imagePullSecrets this would fail with ImagePullBackOff
      image: registry.example.com/my-app:latest
      ports:
        - containerPort: 8080
