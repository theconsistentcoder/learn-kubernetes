apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: my-log-collector
  labels:
    app: log-collector
spec:
  selector:
    matchLabels:
      app: log-collector
  template:
    metadata:
      labels:
        app: log-collector
    spec:
      containers:
        - name: log-collector-container
          image: busybox
          # Simulates a log collector reading node logs every 5 seconds
          command: ["sh", "-c", "while true; do echo 'Collecting logs from node at $(date)'; sleep 5; done"]
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

