apiVersion: v1
kind: LimitRange
metadata:
  name: my-limitrange
spec:
  limits:
    - type: Container
      default:
        # Default limits applied to every container that does not set its own
        cpu: "200m"
        memory: "128Mi"
      defaultRequest:
        # Default requests applied to every container that does not set its own
        cpu: "100m"
        memory: "64Mi"
