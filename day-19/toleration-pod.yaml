apiVersion: v1
kind: Pod
metadata:
  name: my-toleration-pod
  labels:
    app: my-app
spec:
  tolerations:
    # Must match the taint exactly — key, value, effect
    # operator: Equal checks for exact key=value match
    - key: "dedicated"
      operator: "Equal"
      value: "gpu"
      effect: "NoSchedule"
  containers:
    - name: nginx-container
      image: nginx
      ports:
        - containerPort: 80
